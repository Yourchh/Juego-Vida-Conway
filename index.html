<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Juego de la Vida - Dual</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .controles { background: #2a2a2a; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        canvas { background: #000; border: 2px solid #555; display: block; margin: 0 auto; cursor: crosshair; }
        button { padding: 10px 15px; margin: 5px; cursor: pointer; border: none; border-radius: 4px; background: #444; color: white; }
        button:hover { background: #666; }
        .activo { background: #007bff !important; }
        .info-txt { color: #aaa; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body onload="inicia()">
    <div class="controles">
        <button id="btn1" onclick="cambiarModo(1)" class="activo">Modo 1: Automático</button>
        <button id="btn2" onclick="cambiarModo(2)">Modo 2: Editor</button>
        <br>
        <button onclick="inicializaTablero(tablero, true)">Reiniciar Aleatorio (T)</button>
        <button onclick="inicializaTablero(tablero, false)">Vaciar Tablero (R)</button>
        
        <div id="controlesEditor" style="display:none; margin-top: 10px;">
            <button onclick="controlaPausa()">Pausar/Reanudar (Espacio)</button>
            <span id="txtFps">FPS: 20</span>
            <button onclick="aumentaFPS()">+</button>
            <button onclick="reduceFPS()">-</button>
        </div>
        <div class="info-txt">
            Modo Editor: Haz clic para estampar un patrón. Usa (Espacio) para pausar/iniciar.
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <script src="juego.js"></script>
</body>
</html>
